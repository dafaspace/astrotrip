:root{
  --paper:#f6f2ea; --paper2:#efe9dd; --paper3:#e6dece; --line:#d8cfba;
  --ink:#211d18; --ink2:#5f574a; --ink3:#9a8f7c;
  --accent:#b5714a; --axis:#c04f86; --mc:#3f6ea5;
  --harm:#3f6ea5; --hard:#c0685c; --conj:#7d8a6a;
  --wheelbg:#eef4f5;
  --fire:#e39a86; --earth:#a9c99a; --air:#e6d38a; --water:#8fc7d4;
  --radius:16px;
}
@media (prefers-color-scheme: dark){
  :root{
    --paper:#17150f; --paper2:#1f1c15; --paper3:#272319; --line:#38321f;
    --ink:#efe7d6; --ink2:#b3a892; --ink3:#7c7360;
    --accent:#d68c60; --wheelbg:#12171a;
    --axis:#d67aa6; --mc:#6f9fd0; --harm:#6f9fd0;
    --fire:#a86a58; --earth:#6f8a62; --air:#a89454; --water:#5c8a94;
  }
}
*{box-sizing:border-box}
html,body{margin:0}
body{
  background:var(--paper); color:var(--ink);
  font:15px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif;
  -webkit-text-size-adjust:100%; padding:0 0 60px;
}
h1,h2,h3,.serif{font-family:"Newsreader",Georgia,"Times New Roman",serif;font-weight:500}
header{padding:20px 20px 8px;max-width:760px;margin:0 auto;display:flex;align-items:flex-start;gap:12px}
header .ht{flex:1}
header h1{font-size:26px;margin:0;letter-spacing:.2px}
header p{margin:4px 0 0;color:var(--ink2);font-size:13px}
.wrap{max-width:760px;margin:0 auto;padding:0 20px}
.card{background:var(--paper2);border:1px solid var(--line);border-radius:var(--radius);padding:16px;margin:14px 0}
.card h2{font-size:16px;margin:0 0 12px}
label{display:block;font-size:11px;text-transform:uppercase;letter-spacing:.6px;color:var(--ink3);margin:0 0 4px}
input,select{
  width:100%;padding:9px 10px;border:1px solid var(--line);border-radius:10px;
  background:var(--paper);color:var(--ink);font:inherit;font-variant-numeric:tabular-nums;
}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
button{font:inherit;cursor:pointer;border-radius:10px;border:1px solid var(--line);background:var(--paper3);color:var(--ink);padding:9px 14px}
button.primary{background:var(--accent);border-color:var(--accent);color:#fff}
.lang{display:flex;border:1px solid var(--line);border-radius:9px;overflow:hidden;flex:none}
.lang button{border:none;border-radius:0;padding:6px 11px;background:var(--paper2);font-size:13px}
.lang button.on{background:var(--accent);color:#fff}
.mono,.deg{font-variant-numeric:tabular-nums;font-feature-settings:"tnum"}
svg{display:block;width:100%;height:auto;touch-action:manipulation}
.af{font-family:'Astro','Segoe UI Symbol','Apple Symbols',serif;font-style:normal}
.planet-row{display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:1px solid var(--line);font-variant-numeric:tabular-nums}
.planet-row:last-child{border-bottom:none}
.planet-row .g{font-size:19px;width:26px;text-align:center}
.planet-row .nm{width:150px;color:var(--ink2)}
.planet-row .pos{font-weight:500}
.planet-row .hs{margin-left:auto;color:var(--ink3);font-size:12px}
.muted{color:var(--ink2)}
.tiny{font-size:12px;color:var(--ink3)}
.detail{background:var(--paper3);border-radius:12px;padding:12px;margin-top:10px;min-height:20px}
.detail.empty{color:var(--ink3);font-style:italic}
.transit{border:1px solid var(--line);border-radius:12px;padding:12px;margin:10px 0;background:var(--paper)}
.daysyn{border:1px solid var(--accent);border-radius:12px;padding:12px 14px;margin:0 0 12px;background:var(--paper3);font-size:14px;line-height:1.55}
.daysyn:empty{display:none}
.transit .head{display:flex;align-items:center;gap:8px;font-size:15px}
.transit .bar{height:6px;border-radius:3px;background:var(--paper3);margin:8px 0;overflow:hidden}
.transit .bar i{display:block;height:100%;background:var(--accent)}
.rate{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px;align-items:center}
.chip{padding:5px 9px;border:1px solid var(--line);border-radius:999px;font-size:12px;cursor:pointer;background:var(--paper2);user-select:none}
.chip.on{background:var(--accent);border-color:var(--accent);color:#fff}
.stars{letter-spacing:2px;font-size:18px;cursor:pointer;user-select:none;color:var(--ink3)}
.stars b{color:var(--accent);font-weight:400}
.learn-line{padding:8px 0;border-bottom:1px solid var(--line);font-size:14px}
.learn-line:last-child{border:none}
.learn-line b{color:var(--accent);font-weight:500}

function moonPos(d,sun){

function formatOffset(h){
  const sign=h<0?'-':'+', a=Math.abs(h); let hh=Math.floor(a+1e-9), mm=Math.round((a-hh)*60);
  if(mm===60){mm=0;hh++;}
  return sign+String(hh).padStart(2,'0')+':'+String(mm).padStart(2,'0');
}
function parseOffset(str){
  const m=/^\s*([+-])?\s*(\d{1,2})(?::?(\d{2}))?\s*$/.exec(str||'');
  if(!m) return NaN;
  return (m[1]==='-'?-1:1)*(+m[2]+(+(m[3]||0))/60);
}
function ianaOffset(zone,y,mo,da,hh,mi){
  try{
    const guess=new Date(Date.UTC(y,mo-1,da,hh,mi));
    const fmt=new Intl.DateTimeFormat('en-US',{timeZone:zone,timeZoneName:'longOffset',hour12:false,
      year:'numeric',month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'});
    const part=fmt.formatToParts(guess).find(p=>p.type==='timeZoneName');
    if(!part) return null;
    const m=/GMT([+-])(\d{1,2})(?::(\d{2}))?/.exec(part.value);
    if(!m) return 0;
    return (m[1]==='-'?-1:1)*(+m[2]+(+(m[3]||0))/60);
  }catch(e){ return null; }
}

/* ---------- chart computation ---------- */
function computeChart(y,mo,day,localH,tzOff,lat,lng){
  const utH=localH-tzOff, d=dayNumber(y,mo,day,utH), sun=sunPos(d), ecl=23.4393-3.563e-7*d, pos={};
  pos.Sun={lon:sun.lon};
  const mp=moonPos(d,sun); pos.Moon={lon:mp.lon};
  ['Mercury','Venus','Mars','Jupiter','Saturn','Uranus','Neptune'].forEach(n=>pos[n]=planetPos(n,d,sun));
  pos.Pluto=plutoPos(d,sun);
  pos.NNode={lon:mp.node}; pos.SNode={lon:rev(mp.node+180)};
  pos.Lilith={lon:lilithLon(d)};
  const sel=selenaLon(d); if(sel!=null) pos.Selena={lon:sel};
  const gmst0=rev(sun.Ls+180), lst=rev(gmst0+utH*15.04107+lng), ramc=lst;
  const mc=atan2d(sind(ramc),cosd(ramc)*cosd(ecl));
  let asc=atan2d(cosd(ramc),-(sind(ramc)*cosd(ecl)+tand(lat)*sind(ecl)));
  if(rev(asc-mc)>180) asc=rev(asc+180);
  const houses=placidusCusps(ramc,lat,ecl,asc,mc);
  return {pos,asc,mc,ecl,houses,d};
}

/* Placidus intermediate cusps by semi-arc trisection (standard iteration).
   For a point ON the ecliptic: tan(dec) = tan(ecl)*sin(RA); AD = asin(tan(lat)*tan(dec));
   diurnal semi-arc = 90+AD, nocturnal = 90-AD.
   Cusp 11: RA = RAMC + SA_d/3;  cusp 12: RAMC + 2*SA_d/3;
   cusp 2:  RA = RAMC + SA_d + SN/3;  cusp 3: RAMC + SA_d + 2*SN/3.
   Falls back to equal houses beyond the polar circle where Placidus is undefined. */
function placidusCusps(ramc,lat,ecl,asc,mc){
  if(Math.abs(lat)>66){
    const c=[];for(let i=0;i<12;i++)c[i]=rev(asc+i*30);
    return {cusps:c,system:'equal'};
  }
  function raToLon(ra){ return atan2d(sind(ra), cosd(ra)*cosd(ecl)); }
  function iterCusp(start,f,nocturnal){
    let ra=rev(ramc+start);
    for(let i=0;i<14;i++){
      const dec=Math.atan(tand(ecl)*sind(ra))*R2D;
      let x=tand(lat)*tand(dec); x=Math.max(-0.999999,Math.min(0.999999,x));
      const ad=asind(x);
      const ra2=nocturnal? rev(ramc+(90+ad)+(90-ad)*f) : rev(ramc+(90+ad)*f);
      if(Math.abs(rev(ra2-ra+180)-180)<1e-6){ra=ra2;break;}
      ra=ra2;
    }
    return raToLon(ra);
  }
  const c11=iterCusp(30,1/3,false), c12=iterCusp(60,2/3,false);
  const c2=iterCusp(120,1/3,true), c3=iterCusp(150,2/3,true);
  const cusps=[asc,c2,c3,rev(mc+180),rev(c11+180),rev(c12+180),rev(asc+180),rev(c2+180),rev(c3+180),mc,c11,c12];
  return {cusps,system:'placidus'};
}
function houseOf(lon,cusps){
  for(let h=0;h<12;h++){
    const a=cusps[h], span=rev(cusps[(h+1)%12]-a);

function findAspects(pos){
  const out=[];

    for(const asp of ASPECTS){const orb=Math.abs(diff-asp.angle);if(orb<=asp.orb){out.push({p1:BODIES[a],p2:BODIES[b],asp,orb});break;}}

 свобода, гениальность, революция","detail":"Высшая планета, транслирующая высший ментальный план: внезапные озарения, сопровождаемые мощными энергетическими разрядами, — десант будущего в настоящее, от которого привычный мир трещит по швам. Даёт независимость, экстравагантность и вспышки гениальности; революция есть неподготовленная эволюция.","low":"Оригинальность ради оригинальности: упрямая эксцентричность, разрушительные выходки и неожиданные удары судьбы «из-за угла водосточной трубой».","plain":"Уран — внезапность и озарение: он ломает привычный ход вещей, чтобы впустить в жизнь что-то новое, часто без спроса.","detail_plain":"С сильным Ураном вас почти невозможно предсказать — идеи и решения приходят вспышками, а окружающие быстро учатся считывать по вам знаки перемен. Непроработанный Уран даёт вспышки хаоса без особой пользы; проработанный превращает эту непредсказуемость в источник неожиданной защиты и свежих решений именно тогда, когда стандартные подходы уже не работают. При слабом Уране таких потрясений в жизни меньше — но и повод для резкого внутреннего прорыва выпадает реже."},"Neptune":{"tokens":[["экстаз",3],["синтез",3],["туман",2],["мистика",2],["сострадание",2],["растворение",2],["обман",2],["интуиция",1]],"short":"экстаз, синтез, туман, сострадание, тайна","detail":"Управляет экстазом, трансом и тончайшим восприятием; единственная планета синтеза — мир как нечленимое целое, чудо, исчезающее при попытке разъять его на части. Высшая октава — космическая любовь, ясновидение и тонкая затягивающая власть; низшая — туман, в котором теряется граница между правдой, ложью и самообманом.","low":"Самообман и эскапизм: человек вплывает в искажённую «дурную» реальность — иррациональное чувство вины, алкоголь, наркотики и бегство от мира как суррогат экстаза.","plain":"Нептун — интуиция и туман: он стирает чёткие границы реальности, давая взамен тонкое чутьё, которое легко спутать с самообманом.","detail_plain":"С сильным Нептуном вы улавливаете то, что почти никто не замечает, но с той же лёгкостью можете исказить происходящее — и для себя, и для других. Разница между тонким восприятием и красивым враньём себе здесь только в честности, с которой вы к этому подходите. При слабом Нептуне мир воспринимается трезвее и без магии момента, но и меньше доступа к состояниям, где интуиция говорит громче фактов."},"Pluto":{"tokens":[["трансформация",3],["очищение",3],["власть",2],["рок",2],["глубина",2],["самоотречение",2],["воля",1],["смерть",1]],"short":"трансформация, очищение, власть, рок, глубина","detail":"Символ рока и повелитель самых глубоких программ подсознания: холодное пламя, которое находит малейшие червоточины и сжигает гнилое, расчищая обманы Нептуна. Ставит перед жёстким выбором и даёт огромную скрытую силу воли и власть над коллективами — но требует самоотречения; трансформация всегда безжалостна, даже когда безболезненна.","low":"Неосознанная жажда власти и деспотизм: холодное пламя направляется на других — грубое и быстрое разрушение вместо тонкой трансформации, вплоть до сделки с дьяволом.","plain":"Плутон — глубина и слом: он показывает то, что спрятано, и требует отпустить то, что уже отжило.","detail_plain":"С сильным Плутоном вы почти физически чувствуете, где у людей и ситуаций слабое место — это редко делает вас всеобщим любимцем, зато даёт настоящую силу проходить через потери, которых в жизни будет немало. При слабом Плутоне таких обвальных кризисов меньше, но и меньше стимула регулярно расчищать то, что давно пора отпустить — комфортная среда может держаться дольше, чем стоило бы."},"NNode":{"tokens":[["новизна",3],["развитие",3],["будущее",2],["социум",2],["рост",2],["расширение",1],["энтузиазм",1]],"short":"новизна, развитие, будущее, социум, рост","detail":"Кармическое «куда»: программы связи с социумом, впервые возникающие в этой жизни, — расширение социального восприятия и участие в новых общественных формах на новом уровне; имеет оттенок Юпитера. Здесь человеку интересно, но он плохо умеет — это направление роста, которое нужно осваивать, опираясь на опыт Южного узла.","low":"Энтузиаст новых веяний без чувства корней: глотает поверхностную энергию свежих начинаний, а при поражении — демагог, спекулирующий актуальными лозунгами.","plain":"Северный узел — направление роста: то новое, к чему вас тянет, даже если пока непривычно и неудобно.","detail_plain":"Южный узел — это опора и всё уже знакомое, Северный — то, что ещё предстоит освоить. Держаться только старого значит застрять, нестись только за новым — оторваться от реальности; настоящая работа узлов — соединить одно с другим, не жертвуя ни устойчивостью, ни движением."},"SNode":{"tokens":[["прошлое",3],["опыт",3],["традиция",3],["привычка",2],["мудрость",2],["консерватизм",2],["ограничение",1]],"short":"прошлое, опыт, традиция, привычка, мудрость","detail":"Кармическое «откуда»: социальные программы, наработанные в прошлых жизнях, — то, что человек уже имеет и что легко получается; даёт власть и инстинктивную мудрость, чувство традиции и истории; имеет оттенок Сатурна. Этим опытом можно и нужно пользоваться — но как опорой для движения к Северному узлу, а не как убежищем.","low":"Искушение ходить протоптанными тропами: застревание во внутренних штампах и привычном укладе, ретроградство, тормозящее развитие.","plain":"Южный узел — опора и привычка: то, что вы уже умеете и к чему возвращаетесь на автомате.","detail_plain":"Это фундамент, на который можно опереться, но и ловушка ностальгии, если застрять в нём насовсем. Проработка Южного узла — не отказ от прошлого, а умение брать из него то, что действительно нужно, не таща за собой всё остальное просто по привычке."}},"signs":{"Aries":{"tokens":[["энергия",3],["порыв",3],["действие",2],["искра",2],["энтузиазм",2],["наивность",1],["цикличность",1]],"short":"искра, порыв, атака, энтузиазм, наивность","detail":"Первичный импульс огня: пробка от шампанского, вылетающая с шумом и тут же падающая. Творит себя через энергичное практическое действие, но нуждается во внешней искре — без вдохновляющей идеи проваливается в депрессию. Низшая октава — пещерный человек с приступами гнева и узостью мышления; высшая — генерал, вдохновляющий войско на великие сражения.","formula":null,"plain":"Сразу действует, загорается быстро и так же быстро гаснет — нужна искра, чтобы не заскучать."},"Taurus":{"tokens":[["форма",3],["надёжность",3],["чувственность",2],["упорство",2],["материализация",2],["эстетика",2],["лень",1],["инерция",1]],"short":"форма, надёжность, чувственность, упорство, укоренение","detail":"Форма, только что ощутившая и празднующая себя: вол, неутомимо тянущий тяжёлый воз. Воспринимает мир осязанием, срастается с любимыми формами и материализует чужие идеи; задача — превратить упрямство в упорство и найти свою программу, тогда во лбу зажигается Альдебаран. Ловушка — окостенение в привычном, лень и слепое упрямство, с которого не сдвинуть ни с ложного пути, ни с истинного.","formula":null,"plain":"Медленно, но надёжно: держится за то, что выбрал, и лучше понимает мир на ощупь, чем на слух."},"Gemini":{"tokens":[["связь",3],["информация",3],["лёгкость",2],["любопытство",2],["посредничество",2],["блеск",2],["непостоянство",1],["рассеяние",1]],"short":"связь, информация, блеск, любопытство, скольжение","detail":"Чистая коммуникация, поставившая себя во главу угла: живой реферативный журнал, слизывающий верхний слой знания и передающий его дальше. Даже эмоции воспринимает как вариант информации, отчего кажется холодным; блеск и скорость ума препятствуют глубокому контакту. Задача высшей октавы — найти слова для философии каждой области и подготовить синтез наук и религий; ловушка — суета, сплетни и иллюзия понимания всех.","formula":null,"plain":"Быстро схватывает, быстро пересказывает, легко переключается — вглубь идёт, только если разрешить себе не скакать."},"Cancer":{"tokens":[["глубина",3],["эмоция",3],["панцирь",3],["тайна",2],["интуиция",2],["адаптация",2],["дом",1],["скрытность",1]],"short":"глубина, панцирь, эмоция, тайна, переваривание","detail":"Вода в зоне созидания: постижение мира через внутреннюю трансформацию, где мысль и эмоция слиты воедино. Уязвимость выращивает толстый панцирь; чужая идея сначала отвергается, потом переваривается в подсознании и всплывает как собственная. Цель — не совершенствовать панцирь, а выражать миру свои глубокие эмоции; ловушка — коварство, тайная манипуляция и матёрый эгоизм чёрной дыры, пожирающей чужое тепло.","formula":null,"plain":"Чувствует остро, поэтому обрастает защитой: чужое сначала отвергает, потом тихо присваивает."},"Leo":{"tokens":[["энергия",3],["поток",3],["власть",2],["признание",2],["благородство",2],["творчество",2],["сцена",1],["самоослепление",1]],"short":"поток, сцена, власть, благородство, признание","detail":"Ровный, ни от кого не зависящий поток энергии, способный годами зажигать коллективы: командир, лично увлекающий роту в атаку, и большой котёнок в глубине души. Экзистенциально предан своей идее и живёт аплодисментами — невнимание ранит его сильнее удара. Задача — из раба потока стать его управителем (уровень творчества); ловушка — служение эгоизму, лицемерие власти и слепота ко всему, что не освещено собственным огнём.","formula":null,"plain":"Держит ровный внутренний огонь и остро нуждается, чтобы его видели и ценили."},"Virgo":{"tokens":[["деталь",3],["порядок",3],["форма",2],["анализ",2],["труд",2],["чистота",2],["служение",1],["дробление",1]],"short":"деталь, порядок, анализ, труд, чистота","detail":"Земля, осознавшая себя носителем формы через подробности: Эркюль Пуаро, восстанавливающий истину по тончайшим несоответствиям. Она — соль земли и основа Космоса против Хаоса, принцип систематического бескорыстного труда (карма-йога). Парадокс и ловушка: дробит детали до потери смысла, вивисекцией убивая живое целое, а нереализованная — оборачивается нечистоплотностью, вычурными неврозами и требовательностью к другим вместо себя.","formula":null,"plain":"Замечает детали, наводит порядок и трудится не ради похвалы, а потому что иначе не может."},"Libra":{"tokens":[["равновесие",3],["гармония",3],["справедливость",2],["суд",2],["связь",2],["красота",2],["холодность",1],["колебание",1]],"short":"равновесие, гармония, суд, красота, беспристрастие","detail":"Динамическое равновесие как высший закон Абсолюта: велосипедист на вираже, а не шарик в лунке. Судья и дипломат, смотрящий на всё сразу с нескольких сторон; учит видеть гармонию не локальную, а глобальную, в историческом развитии — и потому воспринимается как самый жёсткий знак. Внутри остро ощущает собственную дисгармоничность; ловушка — словесная суета вокруг 104 несущественных аспектов, высокомерие и прыжки из чаши в чашу вместо пересмотра системы ценностей.","formula":null,"plain":"Ищет равновесие во всём и сверяет любой выбор с тем, что почувствует другой человек."},"Scorpio":{"tokens":[["трансформация",3],["глубина",3],["смерть",2],["магнетизм",2],["психология",2],["власть",2],["возрождение",1],["яд",1]],"short":"трансформация, глубина, магнетизм, смерть, возрождение","detail":"Самое развитое проявление воды: живое трансформирующее начало, меняющее и себя, и мир до конца, — плуг, переворачивающий пласт земли. Внутри постоянные перемены психики с бушующими эмоциями за полной закрытостью; эволюционная лестница от тарантула через серую ящерицу к орлу и голубю Святого Духа. Задача — преодолеть искушение власти и стать прозрачным для агрессии; ловушка — ядовитое жало, питающееся бессильной ненавистью жертвы, и саморазрушение.","formula":null,"plain":"Меняет себя и всё вокруг до основания: внутри буря, снаружи — полная закрытость."},"Sagittarius":{"tokens":[["устремлённость",3],["идея",3],["свобода",2],["обаяние",2],["широта",2],["энтузиазм",2],["проповедь",1],["непостоянство",1]],"short":"устремлённость, идеал, свобода, обаяние, проповедь","detail":"Кентавр, пускающий сверкающую стрелу прямо в небо: огонь, ставший устремлённостью к Абсолюту, оптимизмом и неотразимым обаянием. Получает истину из высших сфер и излучает её в пространство, видя мир в целом и не замечая подробностей вроде вашей внутренней жизни. Задача — выразить высшие идеи адекватно и точно попасть в цель, иначе стрела возвращается и поражает его самого; ловушка — невнимательность, безответственность и россыпь невыполненных обещаний.","formula":null,"plain":"Верит в большую идею и стремится к ней напрямую, не всегда замечая, что творится у него под ногами."},"Capricorn":{"tokens":[["цель",3],["восхождение",3],["структура",2],["труд",2],["ответственность",2],["время",2],["аскеза",1],["уныние",1]],"short":"восхождение, цель, структура, ответственность, терпение","detail":"Горная коза с рыбьим хвостом, неутомимо карабкающаяся к вершине: одна большая кармическая задача на целую жизнь. Практический организатор, творящий тонкие формы — коллективы, учения, государства, — которые зримо материализуются; самый сильный знак на дистанции десятилетий. Начинает любое дело с уныния перед горой хаоса, но с годами молодеет; ловушка — паук, методично высасывающий кровь из легкомысленных, и отношение к людям как к средству.","formula":null,"plain":"Идёт к одной большой цели годами, шаг за шагом, через дисциплину и терпение."},"Aquarius":{"tokens":[["будущее",3],["озарение",3],["свобода",2],["оригинальность",2],["дружба",2],["отстранённость",2],["структура",1],["связь",1]],"short":"будущее, озарение, свобода, дружба, отстранённость","detail":"Машина времени: проводник будущего, приносящий человечеству неведомые мысли и структуры и переводящий язык грядущего на земной. Холоден и безличен — транслирует истину через голову, не через сердце; плохо понимает любовь, но высоко ценит дружбу и льёт из двух кувшинов мёртвую и живую воду. Задача — разобраться в бессвязной куче своих идей и посеять ростки будущего; ловушка — ложная независимость, неумный эксцентрик, настаивающий на оригинальных глупостях.","formula":null,"plain":"Смотрит вперёд и мыслит нестандартно; дружбу ценит больше, чем близость."},"Pisces":{"tokens":[["сострадание",3],["растворение",3],["интуиция",2],["адаптация",2],["воображение",2],["трансформация",1],["глубина",1],["ускользание",1]],"short":"сострадание, растворение, интуиция, милосердие, ускользание","detail":"Две рыбы, плывущие вверх и вниз: Космическая любовь как милосердие и сострадание, способная на минуту поднять любого почти до Бога, показав ему далёкое будущее его души. Тончайшая трансформация гомеопатическими дозами, идеальная адаптация к любой воде и жизнь в мире воображения, где образ реальнее оригинала. Путь — от Манон Леско к Деве Марии; ловушка — мусорный ящик Зодиака: всеядность к любой энергии, лесть, эмоциональная помойка и незаметный разворот вниз.","formula":null,"plain":"Сочувствует до растворения в другом и живёт во многом в собственном воображении."}},"houses":{"H1":{"tokens":[["личность",3],["маска",3],["самовыражение",3],["восприятие",2],["внешность",2],["инициатива",2],["обаяние",1],["уязвимость",1]],"short":"личность, маска, самовыражение, внешность, восприятие","detail":"Сцена первого дома — сам человек: поверхностный слой программ подсознания, набор социальных ролей и масок, через которые он выражает себя и воспринимает мир (асцендент — тонкая плёнка на входе и выходе психики). Включение дома — минуты, когда человек говорит о себе, предстаёт перед миром, захвачен врасплох; сильный первый дом забирает львиную долю внимания и любви окружающих. Ловушка непроработанного дома — полная идентификация с масками и взгляд на себя глазами общественного мнения: ключевые слова низшей октавы — «тушеваться» и «выпендриваться», крикливый фанфарон или обаятельный манипулятор.","plain":"Как вы выглядите и подаёте себя миру — первое впечатление и то, с чем вы сталкиваетесь лицом к лицу."},"H2":{"tokens":[["собственность",3],["деньги",3],["этика",3],["ценности",2],["вещи",2],["энергообмен",2],["жадность",1],["устойчивость",1]],"short":"собственность, деньги, ценности, этика, энергообмен","detail":"Второй дом — взаимодействие человека с внешним миром через вещи, деньги и ценности, материальные и духовные; умение тратить деньги — символ энергетического баланса с материальным миром. Проживается как ощущение собственности и выбор в каждом контакте с миром: развитый дом даёт жизнь среди вещей как среди людей, прикладную магию уюта и всеобъемлющую бытовую этику. Ловушка — жадность и расточительство как нарушения баланса: желание брать у мира, бездушно владеть и ничего не отдавать, вплоть до отношения к близким как к предметам обстановки.","plain":"Деньги, вещи и то, что вы цените — ваше отношение к собственности."},"H3":{"tokens":[["информация",3],["общение",3],["рассудок",2],["обучение",2],["знакомые",2],["братья",2],["эрудиция",1],["суета",1]],"short":"информация, общение, обучение, знакомые, рассудок","detail":"Третий дом — информационный поток и этика отношений с людьми вообще: разговоры, чтение, учёба, транспорт, инстанции, соседи, братья и сёстры; информация здесь остаётся в рамках уже имеющейся картины мира (её расширение — девятый дом). Включение проживается как обработка информации и умственная работа средней руки; развитый дом даёт превосходную эрудицию и социальную адаптацию — человек всех знает и всё связывает. Ловушка — «мертвящий ум» и манипуляторство: холодные рационализации грубы для тонких вещей, а низшая октава даёт эксплуататора чужих душ и жёсткие подсознательные стандарты типа «все эгоисты, доверять никому нельзя».","plain":"Общение, учёба, повседневные контакты — разговоры, соседи, короткие поездки."},"H4":{"tokens":[["дом",3],["корни",3],["семья",3],["родина",2],["подсознание",2],["фундамент",2],["отец",1],["старость",1]],"short":"дом, корни, семья, родина, подсознание","detail":"Четвёртый дом — фундамент жизни: глубины подсознания, базовые жизненные позиции, дом и недвижимость, корни и родина, отец как защитник детства, конец жизни и финал любого дела. Проживается как самое интимное — глубинная религиозность и психический дом, где человеку по-настоящему уютно; рассуждения тут не характерны, работают простые, но всеохватные установки. Ловушка непроработанного дома — «невидимые миру слёзы»: подсознательный страх близких, отчуждение, защита «каждый сам за себя», а при гармонии — пассивность и иллюзия уже достигнутого идеала.","plain":"Дом, семья и корни — то, что происходит внутри, а не напоказ."},"H5":{"tokens":[["творчество",3],["роль",3],["любовь",3],["сцена",2],["игра",2],["дети",2],["самовыражение",1],["Бог",1]],"short":"творчество, сцена, роль, любовь, дети","detail":"Пятый дом — внешнее, экстериоризованное «я»: образы и роли, которыми человек является миру и Богу, сцена (для актёра и зрителя), личное творчество, игры, любовь и дети как продукт творчества. Проживается как игра с частичкой сознания вне роли: развитый дом даёт истинную непосредственность и большой репертуар образов, адекватных ситуации. Ловушка — сведение себя к двум-трём приросшим маскам, которые срастаются с личностью; при поражении чужая любовь воспринимается как угроза, собственная выходит исковерканной и несчастной, а человек считает себя подонком и не верит ни в Бога, ни в людей.","plain":"Творчество, романы, дети — всё, где вы проявляете себя через удовольствие и игру."},"H6":{"tokens":[["труд",3],["служение",3],["здоровье",3],["тело",2],["долг",2],["инструменты",2],["повседневность",1],["мастерство",1]],"short":"труд, служение, здоровье, тело, долг","detail":"Шестой дом — каждодневный труд и личное служение: здесь человек служит миру и Богу, оставляя на результате отпечаток своей личности; сюда относятся инструменты, слуги и господа, физическое тело, гигиена и кармические болезни. Проживается как постоянная работа без ожидания награды («жизнь есть постоянная работа»); признак правильного включения — чувство выполненного долга и ровный поток поддерживающей энергии. Ловушка — фанатизм труда или здоровья, когда человек становится придатком захватившей его деятельности, а при поражении — тяжёлая работа с истерическим к ней отношением и болезни как принудительная школа смирения.","plain":"Работа, здоровье и повседневные обязанности — рутина, которая держит вас в форме."},"H7":{"tokens":[["партнёрство",3],["брак",3],["враги",3],["равновесие",2],["сотрудничество",2],["зеркало",2],["мир",1],["конфликт",1]],"short":"партнёрство, брак, враги, равновесие, сотрудничество","detail":"Седьмой дом открывает дневную полусферу: внешний мир является во всей недвусмысленности и оказывается сильнее личности; по нему идут партнёры, муж и жена, открытые враги и сам принцип равновесия «я — не-я». Проживается как личностно окрашенное противостояние с раскрытием партнёра: враги — наши учителя и кривые зеркала, показывающие собственные недоработки. Ловушка — богоборчество и позиция «человек человеку волк»: неверно понятый принцип равновесия ведёт к войне с миром, тогда как проработка — поиск сотрудничества («мы с Богом делаем одно дело»).","plain":"Партнёрство и брак — отношения один на один, включая открытых противников."},"H8":{"tokens":[["коллектив",3],["идеология",3],["кризис",3],["смерть",2],["трансформация",2],["наследство",2],["групповая-этика",1],["власть",1]],"short":"коллектив, идеология, кризис, смерть, наследство","detail":"Восьмой дом — групповая этика и идеология: поведение человека в ситуациях, где действует воля коллектива, формируется общественное мнение и ощущаются незримые законы группы; по вторичным значениям — деньги партнёров, крупные финансы и наследство, а также обстоятельства смерти, физической и «смерти» для коллективов при уходе из них. Проживается как неуютное подчинение ощутимой надличной силе — либо как праздник причастности к групповому мышлению. Ловушка — фанатизм и диктаторство «именем группы»: борьба с чуждыми социальными влияниями вслепую, обожествление своего коллектива и растворение в массовом экстазе.","plain":"Кризисы, общие финансы и всё, что связано с глубокими переменами и зависимостью от других."},"H9":{"tokens":[["идеал",3],["мировоззрение",3],["путешествие",3],["учитель",2],["расширение",2],["философия",2],["убеждения",1],["слава",1]],"short":"идеал, мировоззрение, путешествия, учитель, философия","detail":"Девятый дом — идеал «я» и расширение сущностного сознания: духовные учителя, религиозно-философское развитие, дальние путешествия с эффектом «другого мира», большая наука и слава, дающая власть над умами; по нему же идут дети, для которых родители — духовные учителя. Включение проживается как выход за пределы понятного, часто болезненный: осознаются собственные несовершенства и наступает духовное одиночество. Ловушка — позиция «я всё существенное знаю» и подмена духовности потоком информации, когда гордыня незаметно переключает девятый дом в низшие октавы первого или третьего — самолюбование или ментальную профанацию.","plain":"Убеждения, путешествия, высшее образование — расширение горизонта."},"H10":{"tokens":[["карьера",3],["цель",3],["иерархия",3],["власть",2],["дисциплина",2],["ограничение",2],["мать",1],["выбор",1]],"short":"карьера, цель, иерархия, власть, дисциплина","detail":"Десятый дом — давление внешней реальности, заставляющей ставить практические цели: начальники и подчинённые, карьера, практический план жизни, иерархия «я над людьми и они надо мной»; по нему идёт мать как учитель социальной жизни. Проживается как творчество в обстоятельствах, изменить которые нельзя — «балетный танец в скафандре водолаза»: дом не императивен, но Сатурн требует терпения, смирения и умения видеть знаки судьбы. Ловушка — ложное свободолюбие и отрицание жёстких ситуаций вместо чтения их смысла: подсознательная фобия «мир загнал меня в угол», а при поражении — честолюбивый взлёт с последующим падением и позором.","plain":"Карьера и репутация — то, чего вы добиваетесь на виду у всех."},"H11":{"tokens":[["друзья",3],["группа",3],["единство",3],["равенство",2],["отдых",2],["будущее",2],["наука",1],["терпимость",1]],"short":"друзья, группа, единство, отдых, будущее","detail":"Одиннадцатый дом — организм, где каждая клетка уникальна и незаменима: слаженная групповая работа без главных и второстепенных, друзья, клубы и кружки, праздники и походы, наука как групповое постижение истины и занятия с недостижимой конечной целью. Проживается как растворение в общем духе группы («хочу быть как все») и умение дружить: друг принимает тебя таким, какой ты есть, а друзья не считают взаимных услуг. Ловушка — групповой вампиризм и нигилизм: тянуть общее одеяло на себя, презирать группы и паразитировать, не видя, что групповой разум «туп, силён и хитёр» и требует уважения к своим неписаным законам.","plain":"Друзья, группы и планы на будущее."},"H12":{"tokens":[["жертва",3],["уединение",3],["смирение",3],["милосердие",2],["мистика",2],["тайное",2],["служение",2],["одиночество",1]],"short":"жертва, уединение, смирение, милосердие, мистика","detail":"Двенадцатый дом — связь непосредственно с Абсолютом и безличное служение мировой эволюции в добровольно-принудительном порядке: монастыри, больницы, тюрьмы, тайные враги, скорбь и рок, тема отверженных и жертвы для развития остального мира. Проживается как внутреннее одиночество, ощущение бессмысленности усилий и тяжёлая работа без личного клейма на результате, смысл которой скрыт в мировой карме. Ловушка — эскепизм: уход в фантазии и иллюзии вплоть до расщепления личности, либо роль тюремщика, приносящего в жертву других; проработка требует прощения, милосердия и принятия мира таким, какой он есть.","plain":"Уединение, то, что скрыто от посторонних глаз, и то, чем вы жертвуете ради других."}},"aspects":{"conjunction":{"tokens":[["сплав",3],["сила",3],["притяжение",2],["отталкивание",2],["задача",1]],"short":"сплав, сила, слияние","detail":"Соединение (0°, оттенок Овна) — силовой аспект, сам по себе ни гармоничный, ни поражённый: он даёт большую силу взаимодействия планет — притяжение, если принципы дружественны (тогда они буквально сливаются), и отталкивание, если чужеродны (тогда каждая действует подчёркнуто в отсутствие другой). Кармическая задача воплощения — чтобы каждый принцип обрёл себя и наладил правильные отношения с другим, в этом скрытая энергия аспекта.","plain":"Две силы сливаются в одну и действуют вместе, усиливая друг друга."},"sextile":{"tokens":[["способность",3],["усилие",2],["развитие",2],["контакт",2],["речь",1]],"short":"способность, усилие, развитие","detail":"Секстиль (60°, оттенки Близнецов и Водолея) соединяет два принципа как способности, разрабатывая которые человек сам создаёт себе защиту — меньшую, чем у трина, зато без его самоуспокоенности «чувствую, что могу — и потому делать не буду». Он обещает прекрасные способности к мышлению, контактам и речи (аспект пишущих людей), но для проявления требует усилий, которые человек прилагает без отвращения.","plain":"Даёт способность, которая раскрывается, если приложить немного усилий."},"square":{"tokens":[["препятствие",3],["напряжение",3],["работа",2],["смирение",2],["крючок",1]],"short":"препятствие, напряжение, работа","detail":"Квадрат (90°, трудные оттенки Рака и Козерога) — аспект кармического препятствия: сначала человеку показывают конфету, похожую на трин, но внутри неё стальной крючок — любовь оказывается несчастной, способности идут с полосатым спектром и жизненными помехами. Он требует разобраться в характере препятствий, смирить гордыню, принять ограничения и в трудных условиях совершить необходимую работу — иначе страдания, болезни и вынужденные, а не добровольные ограничения.","plain":"Трение, которое неудобно — но именно через него приходится работать и расти."},"trine":{"tokens":[["поток",3],["защита",3],["талант",2],["везение",2],["расслабление",1]],"short":"поток, защита, талант","detail":"Трин (120°, гармоничные оттенки Льва и Стрельца) соединяет принципы, как правило, в одной стихии и даёт общую защиту по судьбе и в психике: везение, таланты, великодушие, расслабленность — трин сам отведёт удар судьбы. Плата за поток — розовые очки: человек и себе и миру кажется лучше, чем есть, недостатки скрадываются, а дары легко расточаются и не ценятся.","plain":"Всё даётся легко и само — талант, который редко замечают, потому что он не сопротивляется."},"opposition":{"tokens":[["качели",3],["равновесие",3],["поляризация",2],["проекция",2],["отношения",1]],"short":"качели, равновесие, поляризация","detail":"Оппозиция (180°, оттенок Весов) соединяет два принципа как чаши весов: человек акцентирует то одну планету, то другую, и его кармическая задача — обрести равновесие и мудрость точной расстановки акцентов. Часто это проблема отношений: человек облюбовывает себе одну планету, отдавая партнёру или среде другую, но карма поворачивает весы обратно и возникает конфликт — который, в отличие от более жёсткого квадрата, порой можно переждать, закрыв голову руками.","plain":"Два полюса тянут в разные стороны — задача не выбрать один в ущерб другому, а держать баланс."}}};

/* Aspect clauses are partner-aware: the same trine reads differently depending
   on whether the OTHER planet is itself strong (ruler/exalt), weak
   (detriment/fall) or neutral where it sits. This is what "не хватает
   уточнения знака и дома второй планеты" asked for. */
const ASPECT_PARTNER_FRAME={
  hard:{
    strong:(o,l)=>`Есть трение с ${o} (${l}) — но там планета сама по себе сильна, так что трение работает как топливо, а не как помеха.`,
    weak:(o,l)=>`Есть трение с ${o} (${l}) — там планета и так слабовата, поэтому нагрузка ощущается сильнее обычного и просит больше сознательных усилий.`,
    neutral:(o,l)=>`Есть трение с ${o} (${l}) — оно требует настройки, без особого перекоса в лёгкость или тяжесть.`
  },
  harm:{
    strong:(o,l)=>`Легко сочетается с ${o} (${l}) — там планета и так звучит уверенно, так что дар получается двойным и особенно незаметным.`,
    weak:(o,l)=>`Легко сочетается с ${o} (${l}), хотя там планета слабовата — лёгкость реальна, но без особой мощи за ней.`,
    neutral:(o,l)=>`Легко сочетается с ${o} (${l}) — ровный, поддерживающий поток без напряжения.`
  },
  conj:{
    strong:(o,l)=>`Сливается в одно целое с ${o} (${l}) — там планета сильна, и в сплаве получается мощная, слегка однобокая связка.`,
    weak:(o,l)=>`Сливается в одно целое с ${o} (${l}), хотя там планета слабовата — сплав есть, но с меньшим запасом прочности.`,
    neutral:(o,l)=>`Сливается в одно целое с ${o} (${l}) — отделить одно от другого трудно.`
  }
};
function strengthBucket(dig){ return (dig==='ruler'||dig==='exalt')?'strong':(dig==='detriment'||dig==='fall')?'weak':'neutral'; }
const STRENGTH_NOTE={
  strong:' Там планета и так сильна, так что эффект будет крупнее обычного.',
  weak:' Там планета слабовата, так что тема ощущается острее и просит больше сознательных усилий.',
  neutral:''
};
function aspectClause(a,p,ch){
  const other=a.p1===p?a.p2:a.p1;
  const os=Math.floor(rev(ch.pos[other].lon)/30), oh=houseOf(ch.pos[other].lon,ch.houses.cusps);
  const bucket=strengthBucket(dignity(other,os));
  const loc=`${SIGN_LOC.ru[os]}, ${oh}-й дом`;
  const specific=ASPECT_PLANET_FRAME[a.asp.name]&&ASPECT_PLANET_FRAME[a.asp.name][other];
  if(specific){
    return `${uc(ASPECT_NAME.ru[a.asp.name])} с ${PLANET_INSTR[other]||PN(other)} (${loc}): ${specific.d} ${specific.c}${STRENGTH_NOTE[bucket]}`;
  }
  const frame=ASPECT_PARTNER_FRAME[a.asp.kind]&&ASPECT_PARTNER_FRAME[a.asp.kind][bucket];
  if(!frame) return '';
  return frame(PLANET_INSTR[other]||PN(other), loc);
}
/* Rule-based synthesis, not concatenation: combines dignity strength + the
   tone of the strongest aspect into ONE verdict sentence. This is the actual
   "sum" the user asked for - a derived conclusion, not a fourth clause. */
const SYNTH_TEXT={
  '-2':'качеству тут непросто со всех сторон — рост идёт только через явное, осознанное усилие.',
  '-1':'есть заметная нагрузка, но не критичная — с ней вполне можно работать.',
  '0':'ровное, рабочее состояние без явного перекоса в лёгкость или тяжесть.',
  '1':'качеству скорее везёт — получается легче, чем у большинства.',
  '2':'сильная, слаженная сторона характера — здесь всё работает заодно, без внутреннего сопротивления.'
};
const SYN_LEAD=['Итог:','В сумме:','Если сложить всё вместе:'];
function synthesize(dig,strongestAspectKind,vseed){
  const digScore=(dig==='ruler'||dig==='exalt')?1:(dig==='detriment'||dig==='fall')?-1:0;
  const aspScore=strongestAspectKind==='hard'?-1:strongestAspectKind==='harm'?1:0;
  const total=Math.max(-2,Math.min(2,digScore+aspScore));
  return `${SYN_LEAD[hashIdx(vseed+'syn',3)]} ${SYNTH_TEXT[String(total)]}`;
}
/* Small deterministic hash so connective phrasing varies between placements
   without being random - same chart always reads the same way, but 14 cards
   in one reading don't all open with the identical template sentence. */
function hashIdx(str,mod){ let h=0; for(let i=0;i<str.length;i++){h=(h*31+str.charCodeAt(i))>>>0;} return h%mod; }
const SIGN_INTRO_TPL=[
  (loc,pl)=>`${uc(loc)} это выглядит так: ${lc(pl)}`,
  (loc,pl)=>`${uc(loc)} это звучит иначе: ${lc(pl)}`,
  (loc,pl)=>`В этом сочетании получается так: ${lc(pl)}`
];
const HOUSE_INTRO_TPL=[
  (hs,pl)=>`Чаще всего это проявляется в сфере ${hs}-го дома: ${lc(pl)}`,
  (hs,pl)=>`Разворачивается это обычно в сфере ${hs}-го дома: ${lc(pl)}`,
  (hs,pl)=>`Основная сцена для этого — ${hs}-й дом: ${lc(pl)}`
];
function composePlacement(ch,p){
  const P=CORPUS&&CORPUS.planets[p]; if(!P) return null;
  const lon=ch.pos[p].lon, s=Math.floor(rev(lon)/30), hs=houseOf(lon,ch.houses.cusps);
  const S=CORPUS.signs[SIGN_KEYS[s]], H=CORPUS.houses['H'+hs];
  const dig=dignity(p,s);
  const wSign=dig==='ruler'?1.0:dig==='exalt'?0.95:0.85;
  const score={};
  const add=(tokens,mult)=>{(tokens||[]).forEach(([w,x])=>{score[w]=(score[w]||0)+x*mult;});};
  add(P.tokens,1.0); add(S&&S.tokens,wSign); add(H&&H.tokens,0.55);
  const myAspects=aspectsInvolving(ch,p).slice(0,3);
  myAspects.forEach(a=>{
    const A=CORPUS.aspects[a.asp.name], other=a.p1===p?a.p2:a.p1, O=CORPUS.planets[other];
    const k=(1-a.orb/a.asp.orb)*0.45;

  const parts=[P.plain||firstSent(P.detail)];
  if(P.detail_plain) parts.push(P.detail_plain);
  if(S) parts.push(SIGN_INTRO_TPL[hashIdx(p+'sign',3)](SIGN_LOC.ru[s], S.plain||firstSent(S.detail)));
  if(dig) parts.push(DIG_NOTE[dig]);
  if(H) parts.push(HOUSE_INTRO_TPL[hashIdx(p+'house',3)](hs, H.plain||H.short));
  myAspects.slice(0,2).forEach(a=>{ const c=aspectClause(a,p,ch); if(c) parts.push(c); });
  parts.push(synthesize(dig, myAspects[0]&&myAspects[0].asp.kind, p));
  const label=`${PN(p)} ${SIGN_LOC.ru[s]}, ${hs}-й дом`;
  return {label,short,detail:parts.join(' '),score};
}
function composeAsc(ch){
  if(!CORPUS) return null;
  const s=Math.floor(rev(ch.asc)/30);
  const S=CORPUS.signs[SIGN_KEYS[s]], H1=CORPUS.houses.H1;
  if(!S) return null;
  const score={};
  (S.tokens||[]).forEach(([w,x])=>{score[w]=(score[w]||0)+x;});
  (H1&&H1.tokens||[]).forEach(([w,x])=>{score[w]=(score[w]||0)+x*0.4;});
  const short=Object.entries(score).sort((a,b)=>b[1]-a[1]).slice(0,5).map(e=>e[0]).join(', ');
  const detail=`${S.plain||firstSent(S.detail)} Это первое, что видят в вас люди при знакомстве — ваш облик и манера держаться.`;
  return {label:`Асцендент ${SIGN_LOC.ru[s]}`,short,detail,score};
}
/* Karmic axis: sign + house for both nodes, every aspect to the North Node
   (with the aspecting planet's own sign/house/strength via aspectClause, same
   as any other placement) plus anything reaching the South Node that isn't
   already covered. Configuration check: if two planets that both aspect the
   node axis ALSO aspect each other, the axis sits inside a closed figure
   (mini T-square/yod-like lock), not just touched by isolated single lines -
   that changes how load-bearing the karmic theme is, so it's called out. */
const ASPECT_INLOC_RU={conjunction:'в соединении',sextile:'в секстиле',square:'в квадрате',trine:'в трине',opposition:'в оппозиции'};
/* Configuration note: when two planets that both reach the North Node also
   aspect EACH OTHER, that's not just a fact to log - it changes what to do
   about it (hard aspects can't be worked on separately; harmonious ones risk
   one-sided drift; a conjunction means treat them as one theme). Three lead
   variants avoid literal repetition when a chart has several such triangles. */
const CONFIG_CONSEQUENCE={
  hard:'тронешь одну тему — тут же отзовётся вторая, разбираться с ними по отдельности не получится, только вместе.',
  harm:'эта лёгкость вдвоём только усиливается — приятно, но именно поэтому легко застрять в одной раскрученной теме и не заметить перекос.',
  conj:'они настолько срослись, что работают как одно целое — разделять их смысла нет, это единый узел, а не две темы.'
};
const CONFIG_LEAD_TPL=[
  (p1,p2,l)=>`Ещё деталь: ${p1} и ${p2} сами ${l} друг с другом —`,
  (p1,p2,l)=>`${p1} и ${p2} здесь не сами по себе: они ${l} друг с другом, и`,
  (p1,p2,l)=>`Это не разрозненные нити — ${p1} и ${p2} сами ${l} друг с другом, поэтому`
];
function composeNodeAxis(ch){
  if(!CORPUS||!ch.pos.NNode) return '';
  const ns=Math.floor(rev(ch.pos.NNode.lon)/30), nh=houseOf(ch.pos.NNode.lon,ch.houses.cusps);
  const ss=Math.floor(rev(ch.pos.SNode.lon)/30), sh=houseOf(ch.pos.SNode.lon,ch.houses.cusps);
  const N=CORPUS.planets.NNode, S=CORPUS.planets.SNode;
  const parts=[`Кармическая ось начинается в прошлом, ${SIGN_LOC.ru[ss]} (${sh}-й дом): ${lc(S.plain)} А ведёт туда, где рост, ${SIGN_LOC.ru[ns]} (${nh}-й дом): ${lc(N.plain)}`];
  // the nodes are always exactly opposite each other by definition - not a
  // meaningful aspect, so it's excluded from both lists below
  const asN=aspectsInvolving(ch,'NNode').filter(a=>a.p2!=='SNode').slice(0,3);
  if(asN.length){
    asN.forEach(a=>{ const c=aspectClause(a,'NNode',ch); if(c) parts.push(c); });
    for(let i=0;i<asN.length;i++)for(let j=i+1;j<asN.length;j++){
      const p1=asN[i].p2, p2=asN[j].p2;
      let diff=Math.abs(rev(ch.pos[p1].lon-ch.pos[p2].lon)); if(diff>180)diff=360-diff;
      const hit=ASPECTS.find(asp=>Math.abs(diff-asp.angle)<=asp.orb);
      if(hit) parts.push(`${CONFIG_LEAD_TPL[hashIdx(p1+p2+'cfg',3)](PN(p1),PN(p2),ASPECT_INLOC_RU[hit.name])} ${CONFIG_CONSEQUENCE[hit.kind]}`);
    }
  } else {
    parts.push('Крупных аспектов к узлам нет: кармическая тема работает сама по себе, без давления или поддержки со стороны других планет.');
  }
  const asS=aspectsInvolving(ch,'SNode').filter(a=>a.p2!=='NNode'&&!asN.some(b=>b.p2===a.p2)).slice(0,2);
  asS.forEach(a=>{ const c=aspectClause(a,'SNode',ch); if(c) parts.push(c); });

}
/* Whole-chart synthesis: merges Sun+Moon+Ascendant+node axis into one
   portrait, plus the single tightest aspect in the whole chart (the one
   thing most likely to define the person, regardless of which planets it
   involves). */
function composePortrait(ch){
  if(!CORPUS) return null;
  const sun=composePlacement(ch,'Sun'), moon=composePlacement(ch,'Moon'), asc=composeAsc(ch);
  if(!sun||!moon||!asc) return null;
  const nodeRead=ch.pos.NNode?composePlacement(ch,'NNode'):null;
  const score={};
  const addSc=(sc,mult)=>{ if(!sc) return; Object.entries(sc).forEach(([w,x])=>{score[w]=(score[w]||0)+x*mult;}); };
  addSc(sun.score,1.1); addSc(moon.score,1.1); addSc(asc.score,0.9); addSc(nodeRead&&nodeRead.score,0.8);
  const short=Object.entries(score).sort((a,b)=>b[1]-a[1]).slice(0,6).map(e=>e[0]).join(', ');
  const ascSignIdx=Math.floor(rev(ch.asc)/30);
  const ascPlain=CORPUS.signs[SIGN_KEYS[ascSignIdx]].plain;
  const parts=[ascPlain, `В основе характера — ${lc(CORPUS.planets.Sun.plain)}`, `А эмоционально сильнее всего работает вот что: ${lc(CORPUS.planets.Moon.plain)}`];
  const all=findAspects(ch.pos).sort((a,b)=>a.orb-b.orb);
  if(all.length){
    const a=all[0], A=CORPUS.aspects[a.asp.name];
    if(A) parts.push(`Самая заметная связка в характере — ${PN(a.p1)} и ${PN(a.p2)} (${ASPECT_NAME.ru[a.asp.name]}): ${lc(A.plain||A.short)}`);
  }
  const nodeText=composeNodeAxis(ch);
  if(nodeText) parts.push(nodeText);
  return {label:'Портрет',short,detail:parts.join(' ')};
}
function natalReading(ch){
  if(CORPUS&&LANG==='ru'){
    const u=[];
    const portrait=composePortrait(ch); if(portrait) u.push(unitHTML(portrait.label,portrait.short,portrait.detail));
    const asc=composeAsc(ch); if(asc) u.push(unitHTML(asc.label,asc.short,asc.detail));
    const order=['Sun','Moon','Mercury','Venus','Mars','Jupiter','Saturn','Uranus','Neptune','Pluto','NNode','SNode','Lilith','Selena'];
    order.forEach(p=>{

      if(r) u.push(unitHTML(r.label,r.short,r.detail));
    });

  }
  /* EN fallback: simple structural stub until the corpus is translated */
  const u=[];
  const f=FRAME[LANG], loc=SIGN_LOC[LANG], noun=SIGN_NOUN[LANG], det=SIGN_DETAIL[LANG], pc=PLANET_CLAUSE[LANG];
  const items=[['Sun',ch.pos.Sun.lon],['Moon',ch.pos.Moon.lon],['ASC',ch.asc]];
  items.forEach(([p,lon])=>{

  });

    .sort((a,b)=>a.orb-b.orb).slice(0,4).forEach(x=>{
      const label=`${PN(x.p1)} ${ASPECT_NAME[LANG][x.asp.name]} ${PN(x.p2)} · ${t('orb')} ${x.orb.toFixed(1)}°`;
      const fn=PLANET_FN[LANG];
      const cap=s=>s.charAt(0).toUpperCase()+s.slice(1);
      u.push(unitHTML(label,ASPECT_SHORT[LANG][x.asp.name],`${cap(fn[x.p1]||x.p1)} and ${fn[x.p2]||x.p2} ${ASPECT_DETAIL[LANG][x.asp.name]}.`));
    });
  return u.join('');
}

/* ---------- wheel ----------
   Ring order (outside -> in): houses (Placidus, unequal) | zodiac (12x30°) |
   degree ticks (1°, taller each 5°) | planets | aspects with glyph at line midpoint. */
let CURRENT=null, ISO=null;
const S=380, C=S/2;
function polarFor(asc){ return (lon,r)=>{const a=(180-(lon-asc))*D2R;return [C+r*Math.cos(a), C-r*Math.sin(a)];}; }
function drawWheel(ch){
  const asc=ch.asc, polar=polarFor(asc);
  const rHouOut=C-3, rHouIn=C-26, rZodIn=C-52, rTickEnd=C-60, rPl=C-76, rAsp=C-94;
  const cusps=ch.houses.cusps;
  function sector(l0,l1,r1,r2,fill,op){
    const [ax,ay]=polar(l0,r2),[bx,by]=polar(l1,r2),[cx,cy]=polar(l1,r1),[dx,dy]=polar(l0,r1);
    const large=rev(l1-l0)>180?1:0;
    return `<path d="M${ax.toFixed(1)} ${ay.toFixed(1)} A${r2} ${r2} 0 ${large} 1 ${bx.toFixed(1)} ${by.toFixed(1)} L${cx.toFixed(1)} ${cy.toFixed(1)} A${r1} ${r1} 0 ${large} 0 ${dx.toFixed(1)} ${dy.toFixed(1)} Z" fill="${fill}" fill-opacity="${op}" stroke="var(--line)" stroke-width="0.5"/>`;
  }
  let s=`<svg viewBox="0 0 ${S} ${S}" role="img">`;
  s+=`<circle cx="${C}" cy="${C}" r="${rZodIn}" fill="var(--wheelbg)"/>`;
  // --- houses ring (outermost, unequal Placidus sectors) ---
  s+=`<circle cx="${C}" cy="${C}" r="${rHouOut}" fill="none" stroke="var(--line)"/>`;
  s+=`<circle cx="${C}" cy="${C}" r="${rHouIn}" fill="none" stroke="var(--line)"/>`;
  for(let h=0;h<12;h++){
    const a=cusps[h], b=cusps[(h+1)%12];
    const [x1,y1]=polar(a,rHouIn),[x2,y2]=polar(a,rHouOut);
    const angleCusp=(h===0||h===3||h===6||h===9);
    s+=`<line x1="${x1.toFixed(1)}" y1="${y1.toFixed(1)}" x2="${x2.toFixed(1)}" y2="${y2.toFixed(1)}" stroke="${angleCusp?(h===0||h===6?'var(--axis)':'var(--mc)'):'var(--line)'}" stroke-width="${angleCusp?1.5:0.7}"/>`;
    const mid=rev(a+rev(b-a)/2);
    const [rx,ry]=polar(mid,(rHouIn+rHouOut)/2);
    s+=`<text x="${rx.toFixed(1)}" y="${(ry+3.5).toFixed(1)}" text-anchor="middle" font-size="10" fill="var(--ink3)">${ROMAN[h]}</text>`;
  }
  // angle labels outside
  [[cusps[0],'Asc','var(--axis)'],[cusps[6],'Dsc','var(--axis)'],[cusps[9],'MC','var(--mc)'],[cusps[3],'IC','var(--mc)']].forEach(([lon,lbl,col])=>{
    const [lx,ly]=polar(lon,rHouOut+1);
    const dx=lx-C, anchor=Math.abs(dx)<30?'middle':(dx>0?'start':'end');
    s+=`<text x="${lx.toFixed(1)}" y="${(ly+(ly>C?9:-3)).toFixed(1)}" text-anchor="${anchor}" font-size="10" font-weight="600" fill="${col}">${lbl}</text>`;
  });
  // --- zodiac ring (12 x 30°) ---
  for(let i=0;i<12;i++){
    s+=sector(i*30,(i+1)*30,rZodIn,rHouIn,ELEM_VAR[i%4],0.55);
    const [gx,gy]=polar(i*30+15,(rZodIn+rHouIn)/2);
    s+=`<text x="${gx.toFixed(1)}" y="${(gy+5.5).toFixed(1)}" text-anchor="middle" font-size="15" font-family="Astro" fill="var(--ink)">${SIGN_GLYPH[i]}</text>`;
  }
  // --- degree tick ring: every 1°, taller every 5° ---
  let ticks='';
  for(let g=0;g<360;g++){
    const len=(g%5===0)?6.5:3.2;
    const [x1,y1]=polar(g,rZodIn),[x2,y2]=polar(g,rZodIn-len);
    ticks+=`M${x1.toFixed(1)} ${y1.toFixed(1)}L${x2.toFixed(1)} ${y2.toFixed(1)}`;
  }
  s+=`<path d="${ticks}" stroke="var(--ink3)" stroke-width="0.55" opacity="0.75" fill="none"/>`;
  // --- aspects with glyph at midpoint, line broken there ---
  const asps=findAspects(ch.pos);
  asps.forEach(a=>{
    const [x1,y1]=polar(ch.pos[a.p1].lon,rAsp),[x2,y2]=polar(ch.pos[a.p2].lon,rAsp);
    const mx=(x1+x2)/2,my=(y1+y2)/2;
    const dx=x2-x1,dy=y2-y1,L=Math.hypot(dx,dy)||1;
    const gap=8, ux=dx/L, uy=dy/L;
    const ax=mx-ux*gap, ay=my-uy*gap, bx=mx+ux*gap, by=my+uy*gap;
    const dim=ISO&&ISO!==a.p1&&ISO!==a.p2;
    const op=dim?0.07:(ISO?0.95:0.5);
    if(L>gap*2.6){
      s+=`<g opacity="${op}">`;
      s+=`<line x1="${x1.toFixed(1)}" y1="${y1.toFixed(1)}" x2="${ax.toFixed(1)}" y2="${ay.toFixed(1)}" stroke="${a.asp.color}" stroke-width="1"/>`;
      s+=`<line x1="${bx.toFixed(1)}" y1="${by.toFixed(1)}" x2="${x2.toFixed(1)}" y2="${y2.toFixed(1)}" stroke="${a.asp.color}" stroke-width="1"/>`;
      s+=`<circle cx="${mx.toFixed(1)}" cy="${my.toFixed(1)}" r="6.5" fill="var(--wheelbg)"/>`;
      s+=`<text x="${mx.toFixed(1)}" y="${(my+3.5).toFixed(1)}" text-anchor="middle" font-size="10" font-family="Astro" fill="${a.asp.color}">${ASPECT_GLYPH[a.asp.name]}</text>`;
      s+=`</g>`;
    } else {
      s+=`<line x1="${x1.toFixed(1)}" y1="${y1.toFixed(1)}" x2="${x2.toFixed(1)}" y2="${y2.toFixed(1)}" stroke="${a.asp.color}" stroke-width="1" opacity="${op}"/>`;
    }
  });
  // --- planets + karmic points ---
  const shown=BODIES.concat(POINTS.filter(p=>ch.pos[p]));
  const placed=[];
  shown.forEach(n=>{
    let disp=ch.pos[n].lon;
    let guard=0;
    while(placed.some(pl=>Math.abs(rev(disp-pl+180)-180)<8.5)&&guard++<48) disp=rev(disp+3);
    placed.push(disp);
    const [px,py]=polar(disp,rPl);
    const isPoint=POINTS.includes(n);
    const dim=ISO&&ISO!==n&&!asps.some(a=>(a.p1===ISO&&a.p2===n)||(a.p2===ISO&&a.p1===n));
    const hot=ISO===n;
    const [tx,ty]=polar(ch.pos[n].lon,rZodIn-8);
    s+=`<g class="pl" data-p="${n}" style="cursor:pointer" opacity="${dim?0.25:1}">`;
    s+=`<line x1="${tx.toFixed(1)}" y1="${ty.toFixed(1)}" x2="${px.toFixed(1)}" y2="${py.toFixed(1)}" stroke="var(--ink3)" stroke-width="0.5" opacity="0.5"/>`;
    s+=`<circle cx="${px.toFixed(1)}" cy="${py.toFixed(1)}" r="${isPoint?10:12}" fill="var(--paper)" stroke="${hot?'var(--accent)':'var(--line)'}" stroke-width="${hot?2:1}"/>`;
    s+=`<text x="${px.toFixed(1)}" y="${(py+(isPoint?4.5:5)).toFixed(1)}" text-anchor="middle" font-size="${isPoint?12:15}" font-family="Astro" fill="${isPoint?'var(--ink2)':'var(--ink)'}">${GLYPH[n]}</text>`;
    s+=`</g>`;
  });
  s+=`</svg>`;
  document.getElementById('wheel').innerHTML=s;
  document.querySelectorAll('#wheel .pl').forEach(g=>g.addEventListener('click',()=>{const p=g.dataset.p;ISO=(ISO===p?null:p);drawWheel(ch);showDetail(p,ch);}));
}
function showDetail(p,ch){
  const el=document.getElementById('detail'); el.classList.remove('empty');
  const f=fmtPos(ch.pos[p].lon),hs=houseOf(ch.pos[p].lon,ch.houses.cusps);
  const asps=findAspects(ch.pos).filter(a=>a.p1===p||a.p2===p);
  let html=`<div style="font-size:16px"><span class="af">${GLYPH[p]}</span> <b>${PN(p)}</b> - <span class="deg">${f.html}</span>, ${t('house')} ${hs}</div>`;
  if(PLANET_FN[LANG][p]) html+=`<div class="tiny" style="margin:4px 0 8px">${PLANET_FN[LANG][p]}</div>`;
  html+= asps.length? asps.sort((a,b)=>a.orb-b.orb).map(a=>{

/* ---------- transit engine + on-device personalization (no API) ---------- */
const LKEY='astrarium_learn_v1';
function loadLearn(){try{return JSON.parse(localStorage.getItem(LKEY))||{}}catch(e){return{}}}
function saveLearn(o){localStorage.setItem(LKEY,JSON.stringify(o));}
function learn(){const o=loadLearn();o.obs=o.obs||[];o.feat=o.feat||{};return o;}
function featStat(o,k){return o.feat[k]||{rSum:0,rN:0,vSum:0,vN:0};}
function learnedRes(o,k){const f=featStat(o,k);return (2+f.rSum)/(2+f.rN);}
function learnedVal(o,k){const f=featStat(o,k);return (0+f.vSum)/(2+f.vN);}
function currentTransits(ch,y,mo,da){
  let utH;
  if(y==null){ const now=new Date(); y=now.getUTCFullYear(); mo=now.getUTCMonth()+1; da=now.getUTCDate(); utH=now.getUTCHours()+now.getUTCMinutes()/60; }
  else utH=12; // a picked calendar date is evaluated at local noon - day-level granularity
  const tp=computeChart(y,mo,da,utH,0,0,0).pos;
  const hits=[];
  const receivers=BODIES.concat(['ASC','MC','NNode','Lilith']);
  ['Jupiter','Saturn','Uranus','Neptune','Pluto','Mars','Sun','Venus','Mercury'].forEach(T=>{
    receivers.forEach(np=>{
      const nlon=np==='ASC'?ch.asc:np==='MC'?ch.mc:(ch.pos[np]?ch.pos[np].lon:null);
      if(nlon==null)return;
      let diff=Math.abs(rev(tp[T].lon-nlon));if(diff>180)diff=360-diff;
      for(const asp of ASPECTS){const orb=Math.abs(diff-asp.angle),maxo=Math.min(asp.orb,SPEED_ORB[T]+2);if(orb<=maxo){hits.push({tp:T,np,asp,orb,maxo});break;}}
    });
  });
  return hits;
}
function personalWeight(o,h){
  const base=RECEIVER_RANK[h.np]||0.6, intensity=Math.cos((h.orb/h.maxo)*Math.PI/2)**2;
  const personal=(learnedRes(o,'tp:'+h.tp)+learnedRes(o,'np:'+h.np)+learnedRes(o,'as:'+h.asp.name))/3;
  return base*intensity*personal;
}
const sig=h=>`${h.tp}.${h.asp.name}.${h.np}`;
function transitText(o,h){
  const v=(learnedVal(o,'tp:'+h.tp)+learnedVal(o,'np:'+h.np))/2, hard=h.asp.kind==='hard';
  let frame;
  if(LANG==='ru'){
    if(v<=-0.6) frame=hard?'обычно ощущается тяжело именно у вас, берегите силы':'мягкий подъём, который вам обычно в радость';
    else if(v>=0.6) frame=hard?'вы проживаете это как продуктивное давление, а не как надрыв':'лёгкое, заряжающее окно для вас';
    else frame=hard?'точка трения, требующая настройки':'поддерживающее, текучее влияние';
    return `${PN(h.tp)}: ${ASPECT_NAME.ru[h.asp.name]} к вашему «${PN(h.np)}» - ${frame}.`;
  } else {
    if(v<=-0.6) frame=hard?'tends to land heavily for you, protect your energy':'a smooth lift you usually enjoy';
    else if(v>=0.6) frame=hard?'you experience this as productive pressure, not strain':'an easy, energizing window for you';
    else frame=hard?'a friction point that asks for adjustment':'a supportive, flowing influence';
    return `${h.tp} ${h.asp.name} your ${h.np==='ASC'||h.np==='MC'?h.np:PN(h.np)} - ${frame}.`;
  }
}
function recall(o,s){
  const past=o.obs.filter(x=>x.sig===s).sort((a,b)=>b.t-a.t)[0]; if(!past)return '';
  const dt=new Date(past.t).toLocaleDateString(LANG==='ru'?'ru-RU':'en-US');

/* Synthesized read of the whole day: merges the top hits' planet+aspect
   tokens (weighted by personal weight) into one tagline, then leads with the
   single strongest transit's own sentence - a real summary, not a list header. */
function daySynthesis(o,hits){
  if(!hits.length||!CORPUS) return '';
  const score={};
  const add=(toks,mult)=>{(toks||[]).forEach(([w,x])=>{score[w]=(score[w]||0)+x*mult;});};
  hits.slice(0,4).forEach(({h,w})=>{
    add(CORPUS.planets[h.tp]&&CORPUS.planets[h.tp].tokens, w*0.8);
    add(CORPUS.planets[h.np]&&CORPUS.planets[h.np].tokens, w*0.5);
    add(CORPUS.aspects[h.asp.name]&&CORPUS.aspects[h.asp.name].tokens, w*0.6);
  });
  const words=Object.entries(score).sort((a,b)=>b[1]-a[1]).slice(0,5).map(e=>e[0]).join(', ');
  const lead=transitText(o,hits[0].h);
  return words?`Главное в этот день: ${words}. ${lead}`:lead;
}

    return `<div class="transit" data-sig="${s}">
      <div class="head"><span class="af" style="font-size:18px">${GLYPH[h.tp]}</span><span class="af" style="font-size:14px;color:var(--ink3)">${ASPECT_GLYPH[h.asp.name]}</span><span class="af" style="font-size:18px">${GLYPH[h.np]||''}</span><span style="margin-left:4px">${transitText(o,h)}</span></div>
      <div class="tiny">${t('orb')} ${h.orb.toFixed(1)}° · ${t('weight')} ${w.toFixed(2)}</div>
      <div class="bar"><i style="width:${Math.round(intensity*100)}%"></i></div>
      ${recall(o,s)}
      <div class="rate">
        <span class="tiny">${t('landq')}</span>
        <span class="stars" data-sig="${s}">${[1,2,3].map(n=>`<span data-r="${n}">${rated&&rated.r>=n?'<b>★</b>':'☆'}</span>`).join('')}</span>
        <span class="tiny" style="margin-left:8px">${t('felt')}</span>
        ${[['hard','−'],['neutral','·'],['easy','+']].map(([k,g])=>`<span class="chip val ${rated&&rated.val===k?'on':''}" data-sig="${s}" data-val="${k}">${g}</span>`).join('')}
        ${AREA_KEYS.map(a=>`<span class="chip area ${rated&&rated.area===a?'on':''}" data-sig="${s}" data-area="${a}">${AREA_NAME[LANG][a]}</span>`).join('')}
      </div></div>`;
  }).join('');
  box.querySelectorAll('.stars span[data-r]').forEach(st=>st.addEventListener('click',e=>rate(hits,e.currentTarget.parentElement.dataset.sig,{r:+e.currentTarget.dataset.r})));
  box.querySelectorAll('.chip.val').forEach(c=>c.addEventListener('click',()=>rate(hits,c.dataset.sig,{val:c.dataset.val})));
  box.querySelectorAll('.chip.area').forEach(c=>c.addEventListener('click',()=>rate(hits,c.dataset.sig,{area:c.dataset.area})));
  renderLearned();
}
function rate(hits,s,patch){
  const o=learn(),hit=hits.find(x=>sig(x.h)===s); if(!hit)return; const h=hit.h;
  let obs=o.obs.find(x=>x.sig===s&&Date.now()-x.t<86400000*3);
  if(!obs){obs={sig:s,t:Date.now(),tp:h.tp,np:h.np,asp:h.asp.name,r:null,val:null,area:null};o.obs.push(obs);}
  Object.assign(obs,patch); obs.t=Date.now();
  o.feat={};
  o.obs.forEach(x=>{
    const rv=x.r!=null?x.r:1.5, vv=x.val==='hard'?-1.5:x.val==='easy'?1.5:x.val==='neutral'?0:null;
    ['tp:'+x.tp,'np:'+x.np,'as:'+x.asp].forEach(k=>{const f=o.feat[k]=o.feat[k]||{rSum:0,rN:0,vSum:0,vN:0};if(x.r!=null){f.rSum+=rv;f.rN++;}if(vv!=null){f.vSum+=vv;f.vN++;}});
    if(x.area){const k='ar:'+x.area;o.feat[k]=o.feat[k]||{rSum:0,rN:0,vSum:0,vN:0};o.feat[k].rN++;}
  });
  saveLearn(o); renderTransits(CURRENT);
}
function renderLearned(){
  const o=learn(),box=document.getElementById('learnedbox');
  if(!o.obs.length){box.innerHTML=`<p class="tiny">${t('learnempty')}</p>`;return;}
  const L=[];
  ['Jupiter','Saturn','Uranus','Neptune','Pluto','Mars','Sun','Venus','Mercury'].map(p=>({p,f:featStat(o,'tp:'+p)})).filter(x=>x.f.rN>0)
    .sort((a,b)=>learnedRes(o,'tp:'+b.p)-learnedRes(o,'tp:'+a.p)).slice(0,3).forEach(({p})=>{
      const r=learnedRes(o,'tp:'+p),v=learnedVal(o,'tp:'+p);
      if(LANG==='ru'){
        const rl=r>2.2?'звучат сильно':r<1.2?'почти не отзываются':'звучат умеренно', vl=v>0.5?'как заряжающие':v<-0.5?'как тяжёлые':'нейтрально';
        L.push(`Транзиты <b><span class="af">${GLYPH[p]}</span> ${PN(p)}</b> ${rl} у вас, ощущаются ${vl}. <span class="tiny">(резонанс ${r.toFixed(1)}/3, валентность ${v>0?'+':''}${v.toFixed(1)})</span>`);
      } else {
        const rl=r>2.2?'land strongly':r<1.2?'barely register':'land moderately', vl=v>0.5?'as energizing':v<-0.5?'as heavy':'neutrally';
        L.push(`<b><span class="af">${GLYPH[p]}</span> ${p}</b> transits ${rl} for you, felt ${vl}. <span class="tiny">(resonance ${r.toFixed(1)}/3, valence ${v>0?'+':''}${v.toFixed(1)})</span>`);
      }
    });
  ['Sun','Moon','ASC','MC','Venus','Mars','NNode','Lilith'].map(p=>({p,f:featStat(o,'np:'+p)})).filter(x=>x.f.rN>0)
    .sort((a,b)=>b.f.rN-a.f.rN).slice(0,2).forEach(({p})=>{
      const r=learnedRes(o,'np:'+p);
      L.push(LANG==='ru'
        ?`Транзиты к вашему <b><span class="af">${GLYPH[p]||''}</span> ${PN(p)}</b> ${r>2?'много значат':'значат умеренно'} для вас <span class="tiny">(${r.toFixed(1)}/3)</span>.`
        :`Transits to your <b><span class="af">${GLYPH[p]||''}</span> ${p}</b> ${r>2?'matter a lot':'matter moderately'} to you <span class="tiny">(${r.toFixed(1)}/3)</span>.`);
    });
  const ar=AREA_KEYS.map(a=>({a,n:(o.feat['ar:'+a]||{rN:0}).rN})).filter(x=>x.n>0).sort((a,b)=>b.n-a.n);
  if(ar.length) L.push(LANG==='ru'
    ?`Чаще всего вы связываете транзиты со сферой <b>${AREA_NAME.ru[ar[0].a]}</b>. <span class="tiny">(наблюдений: ${o.obs.length})</span>`
    :`You most often connect transits to <b>${AREA_NAME.en[ar[0].a]}</b>. <span class="tiny">(${o.obs.length} observations)</span>`);
  box.innerHTML=L.map(l=>`<div class="learn-line">${l}</div>`).join('');
}

/* ---------- positions ---------- */
function renderPositions(ch){
  let rows=[['ASC',ch.asc],['MC',ch.mc]].map(([n,lon])=>{
    return `<div class="planet-row"><span class="g" style="color:var(--axis);font-size:13px">${n==='ASC'?'Asc':'MC'}</span><span class="nm">${PN(n)}</span><span class="pos deg">${fmtPos(lon).html}</span></div>`;
  }).join('');
  const shown=BODIES.concat(POINTS.filter(p=>ch.pos[p]));
  rows+=shown.map(n=>{
    const f=fmtPos(ch.pos[n].lon),hs=houseOf(ch.pos[n].lon,ch.houses.cusps);
    return `<div class="planet-row"><span class="g af">${GLYPH[n]}</span><span class="nm">${PN(n)}</span><span class="pos deg">${f.html}</span><span class="hs">${t('house')} ${hs}</span></div>`;
  }).join('');
  document.getElementById('positions').innerHTML=rows;
}

/* ---------- run + i18n ---------- */
let SELECTED_CITY=null, TZ_AUTO=true;
function updateTzAuto(){
  if(!TZ_AUTO||!SELECTED_CITY) return;
  const dv=document.getElementById('date').value, tv=document.getElementById('time').value;
  if(!dv||!tv) return;
  const [y,mo,da]=dv.split('-').map(Number);
  const [hh,mi]=tv.split(':').map(Number);
  const off=ianaOffset(SELECTED_CITY.z,y,mo,da,hh,mi);
  if(off!=null) document.getElementById('tz').value=formatOffset(off);
}
function renderCityList(items){
  const box=document.getElementById('citylist');
  if(!items.length){box.style.display='none';box.innerHTML='';return;}
  box.innerHTML=items.map(c=>`<div><span>${LANG==='ru'?c.r:c.e}</span><span class="cc">${c.c}</span></div>`).join('');
  box.style.display='block';
  [...box.children].forEach((el,i)=>el.addEventListener('mousedown',ev=>{ev.preventDefault();selectCity(items[i]);}));
}
function selectCity(c){
  SELECTED_CITY=c; TZ_AUTO=true;
  document.getElementById('city').value=LANG==='ru'?c.r:c.e;
  document.getElementById('lat').value=c.lat;
  document.getElementById('lng').value=c.lon;
  document.getElementById('citylist').style.display='none';
  updateTzAuto();
}
function applyStatic(){
  document.querySelectorAll('[data-i]').forEach(el=>el.textContent=t(el.dataset.i));
  document.querySelectorAll('.lang button').forEach(b=>b.classList.toggle('on',b.dataset.lang===LANG));
  document.getElementById('detail').textContent=t('tapdetail');
  document.getElementById('city').placeholder=t('cityph');
  if(SELECTED_CITY) document.getElementById('city').value=LANG==='ru'?SELECTED_CITY.r:SELECTED_CITY.e;
  document.title='Astrarium';
}
function todayStr(){
  const n=new Date(), p=x=>String(x).padStart(2,'0');
  return `${n.getFullYear()}-${p(n.getMonth()+1)}-${p(n.getDate())}`;
}
function run(){
  const dv=document.getElementById('date').value, tv=document.getElementById('time').value;
  const lat=parseFloat(document.getElementById('lat').value), lng=parseFloat(document.getElementById('lng').value);
  const tz=parseOffset(document.getElementById('tz').value);
  if(!dv||!tv||isNaN(lat)||isNaN(lng)||isNaN(tz)){ alert(t('needdata')); return; }
  const [y,mo,da]=dv.split('-').map(Number);
  const [hh,mi]=tv.split(':').map(Number);
  CURRENT=computeChart(y,mo,da,hh+mi/60,tz,lat,lng); ISO=null;
  document.getElementById('results').style.display='';
  document.getElementById('emptycard').style.display='none';
  document.getElementById('charttitle').textContent=`${t('natal')} · ${CURRENT.houses.system==='placidus'?t('housesys'):t('housesyseq')}`;
  drawWheel(CURRENT); renderPositions(CURRENT);
  document.getElementById('reading').innerHTML=natalReading(CURRENT);
  if(!document.getElementById('transitDate').value) document.getElementById('transitDate').value=todayStr();
  renderTransits(CURRENT);
  document.getElementById('detail').className='detail empty';
  document.getElementById('detail').textContent=t('tapdetail');
}
document.getElementById('calc').addEventListener('click',run);
document.getElementById('reset').addEventListener('click',()=>{localStorage.removeItem(LKEY);if(CURRENT)renderTransits(CURRENT);});
document.getElementById('transitDate').addEventListener('change',()=>{if(CURRENT)renderTransits(CURRENT);});
document.getElementById('transitToday').addEventListener('click',()=>{document.getElementById('transitDate').value=todayStr();if(CURRENT)renderTransits(CURRENT);});
document.getElementById('showSeconds').checked=SHOW_SECONDS;
document.getElementById('showSeconds').addEventListener('change',e=>{
  SHOW_SECONDS=e.target.checked;
  localStorage.setItem('astrarium_seconds',SHOW_SECONDS?'1':'0');
  if(CURRENT){ renderPositions(CURRENT); if(ISO) showDetail(ISO,CURRENT); }
});
document.querySelectorAll('.lang button').forEach(b=>b.addEventListener('click',()=>{
  LANG=b.dataset.lang; localStorage.setItem('astrarium_lang',LANG); applyStatic(); if(CURRENT)run();
}));
document.getElementById('city').addEventListener('input',e=>renderCityList(searchCities(e.target.value)));
document.getElementById('city').addEventListener('focus',e=>renderCityList(searchCities(e.target.value)));
document.getElementById('city').addEventListener('blur',()=>{setTimeout(()=>{document.getElementById('citylist').style.display='none';},150);});
document.getElementById('date').addEventListener('change',updateTzAuto);
document.getElementById('time').addEventListener('change',updateTzAuto);
document.getElementById('tz').addEventListener('input',()=>{TZ_AUTO=false;});
applyStatic();
</script>
